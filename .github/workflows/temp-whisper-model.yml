name: Temporary Faster Whisper CT2 Model

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  package-model:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Download CT2 model
        run: |
          python -m pip install --quiet huggingface_hub
          huggingface-cli download deepdml/faster-whisper-large-v3-turbo-ct2 --local-dir ct2-model
          tar -cf ct2-large-v3-turbo.tar ct2-model
          split -b 350M -d -a 2 ct2-large-v3-turbo.tar ct2.part.
          sha256sum ct2-large-v3-turbo.tar > ct2-model.sha256
          ls -lh ct2.part.* ct2-model.sha256

      - name: Upload split parts
        uses: actions/upload-artifact@v4
        with:
          name: ct2-turbo-parts
          path: ct2.part.*
          retention-days: 1
          compression-level: 0

      - name: Upload checksum
        uses: actions/upload-artifact@v4
        with:
          name: ct2-turbo-checksum
          path: ct2-model.sha256
          retention-days: 1
