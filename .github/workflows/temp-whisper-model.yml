name: Temporary Lecture Transcription

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg cmake build-essential

      - name: Build whisper.cpp
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          cmake -S whisper.cpp -B whisper.cpp/build -DCMAKE_BUILD_TYPE=Release
          cmake --build whisper.cpp/build --config Release -j2

      - name: Download multilingual small model
        run: |
          curl -L --retry 5 --retry-delay 5 -o ggml-small-q5_1.bin \
            'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small-q5_1.bin?download=true'
          ls -lh ggml-small-q5_1.bin

      - name: Reconstruct lecture audio
        run: |
          find lecture_audio_parts -name 'part_*.opus' | sort | sed "s#^#file '#;s#$#'#" > concat.txt
          ffmpeg -y -f concat -safe 0 -i concat.txt -ac 1 -ar 16000 -c:a pcm_s16le lecture.wav
          ffprobe -v error -show_entries format=duration -of default=nw=1 lecture.wav

      - name: Transcribe Arabic and English lecture
        run: |
          mkdir -p output
          whisper.cpp/build/bin/whisper-cli \
            -m ggml-small-q5_1.bin \
            -f lecture.wav \
            -l ar \
            -t 2 \
            -otxt -osrt -ovtt -oj \
            -of output/lecture_transcript \
            --prompt 'محاضرة أو اجتماع باللغة العربية المصرية مع مصطلحات إنجليزية وتقنية. اكتب الكلام كما قيل دون تلخيص.'

      - name: Create Markdown transcript
        run: |
          {
            echo '# التفريغ النصي الكامل للمحاضرة'
            echo
            echo '> تفريغ آلي بواسطة Whisper Small متعدد اللغات. قد تحتاج الأسماء والمصطلحات المتخصصة إلى مراجعة.'
            echo
            cat output/lecture_transcript.txt
          } > output/lecture_transcript.md

      - name: Upload transcript files
        uses: actions/upload-artifact@v4
        with:
          name: lecture-transcript
          path: output/
          retention-days: 1
