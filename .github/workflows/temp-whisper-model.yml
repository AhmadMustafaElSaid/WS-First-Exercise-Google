name: Temporary Whisper Turbo Model

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  package-model:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Download multilingual Large V3 Turbo model
        run: |
          curl -L --retry 5 --retry-delay 5 -o ggml-large-v3-turbo-q5_0.bin 'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo-q5_0.bin?download=true'
          ls -lh ggml-large-v3-turbo-q5_0.bin

      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: whisper-large-v3-turbo-q5
          path: ggml-large-v3-turbo-q5_0.bin
          retention-days: 1
          compression-level: 0
