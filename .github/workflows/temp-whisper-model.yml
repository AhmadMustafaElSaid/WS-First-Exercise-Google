name: Temporary Whisper Source Bundle

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  package-source:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Fetch whisper.cpp source
        run: |
          git clone --depth 1 https://github.com/ggml-org/whisper.cpp.git
          rm -rf whisper.cpp/.git

      - name: Download multilingual models
        run: |
          curl -L --retry 5 --retry-delay 5 -o ggml-base-q5_1.bin 'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base-q5_1.bin?download=true'
          curl -L --retry 5 --retry-delay 5 -o ggml-small-q5_1.bin 'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small-q5_1.bin?download=true'
          ls -lh ggml-base-q5_1.bin ggml-small-q5_1.bin

      - name: Create source bundle
        run: |
          mkdir bundle
          mv whisper.cpp bundle/
          mv ggml-base-q5_1.bin ggml-small-q5_1.bin bundle/
          tar -C bundle -czf whisper-source-bundle.tar.gz .
          ls -lh whisper-source-bundle.tar.gz

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: whisper-source-bundle
          path: whisper-source-bundle.tar.gz
          retention-days: 1
          compression-level: 0
