name: Temporary Whisper Model Artifact

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-model:
    runs-on: ubuntu-latest
    steps:
      - name: Download multilingual Whisper model
        run: |
          set -euxo pipefail
          curl -L --retry 5 --retry-delay 3 -o ggml-base-q5_1.bin \
            'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base-q5_1.bin?download=true'
          ls -lh ggml-base-q5_1.bin
      - name: Upload model archive
        uses: actions/upload-artifact@v4
        with:
          name: whisper-base-multilingual
          path: ggml-base-q5_1.bin
          retention-days: 1
          compression-level: 0
